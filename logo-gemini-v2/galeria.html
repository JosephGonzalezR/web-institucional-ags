<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AGS · 10 logos IA (Google Gemini 3 Pro)</title>
<style>
 body{margin:0;background:#0e1116;color:#e8ecf2;font:15px/1.5 Segoe UI,Arial,sans-serif}
 header{padding:32px 28px 8px} h1{font:600 23px Georgia,serif;margin:0 0 6px}
 .sub{color:#9aa6b6;max-width:820px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding:22px 28px 60px}
 .card{background:#161b22;border:1px solid #232a34;border-radius:14px;overflow:hidden}
 .card img{width:100%;display:block;background:#fff}
 .card h3{margin:0;padding:12px 14px 3px;font:600 14px Segoe UI;color:#dfe6ef}
 .card p{margin:0;padding:0 14px 12px;color:#8f9bab;font-size:12px}
</style></head><body>
<header><h1>AGS · 10 logos generados con Google (Gemini 3 Pro Image)</h1>
<div class="sub">Globo + AGS + Academic Global Solutions, en oro/navy. Dime el número que más te guste (o dos para combinar) y lo tomo como base: lo limpio, lo vectorizo para que quede nítido y editable, genero favicon/PNG y lo monto en la web.</div></header>
<div class="grid" id="g"></div>
<script>
const L=[
 [1,"01_globo_birrete","Globo con birrete (académico)"],
 [2,"02_globo_monolinea","Globo monolínea (minimal)"],
 [3,"03_globo_orbita","Globo con órbita y estrella"],
 [4,"04_escudo_libro","Escudo: globo sobre libro"],
 [5,"05_globo_red","Globo red global (nodos)"],
 [6,"06_globo_letra_g","Globo como la 'G' de AGS"],
 [7,"07_sello_orla","Sello con nombre en la orla"],
 [8,"08_globo_arcos","Globo de arcos ascendentes"],
 [9,"09_globo_laurel","Globo con corona de laureles"],
 [10,"10_lujo_minimal","Lujo minimal (serif + globo fino)"],
];
g.innerHTML=L.map(([n,f,t])=>`<div class="card"><img src="${f}.png" alt="${t}"><h3>#${n} · ${t}</h3><p>Gemini 3 Pro Image</p></div>`).join("");
</script>
</body></html>
